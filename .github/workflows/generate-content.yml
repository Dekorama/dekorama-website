name: Generate SEO Blog Post

on:
  schedule:
    # Every two days at 09:00 UTC
    - cron: '0 9 */2 * *'

  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to write about (leave empty to use next item from queue)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — preview output without writing files'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the PR action can find the base branch
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refill keyword queue from Search Console
        # Only when no explicit keyword is provided (i.e. scheduled run or manual without keyword)
        if: github.event.inputs.keyword == ''
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
        run: |
          node scripts/keyword-research.js --top 10 || echo "Keyword research failed or GSC not configured, continuing with existing queue"

      - name: Generate blog post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            KEYWORD_FLAG="--keyword \"${{ github.event.inputs.keyword }}\""
          else
            KEYWORD_FLAG="--from-queue"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          node scripts/generate-post.js $KEYWORD_FLAG $DRY_FLAG | tee /tmp/generate-output.txt

          # Extract slug for PR title
          ES_SLUG=$(grep "ES slug:" /tmp/generate-output.txt | awk '{print $NF}' || echo "new-post")
          echo "es_slug=$ES_SLUG" >> $GITHUB_OUTPUT

          EN_SLUG=$(grep "EN slug:" /tmp/generate-output.txt | awk '{print $NF}' || echo "new-post-en")
          echo "en_slug=$EN_SLUG" >> $GITHUB_OUTPUT

          # Extract title for PR title
          ES_TITLE=$(grep "ES title:" /tmp/generate-output.txt | sed 's/ES title:  //' || echo "New SEO post")
          echo "es_title=$ES_TITLE" >> $GITHUB_OUTPUT

          echo "es_url=${{ secrets.NEXT_PUBLIC_SITE_URL }}/es/blog/$ES_SLUG" >> $GITHUB_OUTPUT
          echo "en_url=${{ secrets.NEXT_PUBLIC_SITE_URL }}/en/blog/$EN_SLUG" >> $GITHUB_OUTPUT

      - name: Check for new files
        id: changes
        run: |
          if git diff --quiet && git ls-files --others --exclude-standard | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          {
            echo "changed_files<<EOF"
            git diff --name-only
            git ls-files --others --exclude-standard
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Commit and push to main
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog src/lib/blogSlugMap.js public/images/blog scripts/keywords-queue.json
          git commit -m "content: add SEO post \"${{ steps.generate.outputs.es_slug }}\""
          git push origin HEAD:main

      - name: Publish run summary
        if: always()
        env:
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed_files }}
          ES_TITLE: ${{ steps.generate.outputs.es_title }}
          ES_SLUG: ${{ steps.generate.outputs.es_slug }}
          EN_SLUG: ${{ steps.generate.outputs.en_slug }}
          ES_URL: ${{ steps.generate.outputs.es_url }}
          EN_URL: ${{ steps.generate.outputs.en_url }}
          KEYWORD: ${{ github.event.inputs.keyword || 'from queue' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          {
            echo "## SEO generation result"
            echo
            echo "- Keyword: ${KEYWORD}"
            echo "- Dry run: ${DRY_RUN:-false}"
            echo "- Changes written: ${HAS_CHANGES:-false}"
            echo "- ES title: ${ES_TITLE:-n/a}"
            echo "- ES slug: ${ES_SLUG:-n/a}"
            echo "- EN slug: ${EN_SLUG:-n/a}"
            echo "- ES URL: ${ES_URL:-n/a}"
            echo "- EN URL: ${EN_URL:-n/a}"
            echo
            echo "### Changed files"
            if [ -n "${CHANGED_FILES}" ]; then
              printf '%s\n' "${CHANGED_FILES}" | sed '/^$/d' | sed 's/^/- /'
            else
              echo "- None"
            fi
            echo
            echo "### Generator output"
            echo '```text'
            cat /tmp/generate-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Submit new URLs to Google Indexing API
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INDEXING_ES_SLUG: ${{ steps.generate.outputs.es_slug }}
          INDEXING_EN_SLUG: ${{ steps.generate.outputs.en_slug }}
        run: |
          node scripts/submit-indexing.js \
            --es-slug "$INDEXING_ES_SLUG" \
            --en-slug "$INDEXING_EN_SLUG" || echo "Indexing API submission failed (non-fatal)"
