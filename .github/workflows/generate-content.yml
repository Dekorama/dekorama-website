name: Generate SEO Blog Post

on:
  schedule:
    # Every day at 09:00 UTC
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to write about (leave empty to use next item from queue)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — preview output without writing files'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the PR action can find the base branch
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refill keyword queue from Search Console
        # Only when no explicit keyword is provided (i.e. scheduled run or manual without keyword)
        if: github.event.inputs.keyword == ''
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
        run: |
          node scripts/keyword-research.js --top 10 || echo "Keyword research failed or GSC not configured, continuing with existing queue"

      - name: Show keyword queue state
        run: |
          echo "=== keywords-queue.json ==="
          node -e "
            const q = JSON.parse(require('fs').readFileSync('scripts/keywords-queue.json','utf8'));
            q.forEach(k => console.log(k.status, k.keyword));
            console.log('--- pending:', q.filter(k=>k.status==='pending').length, '/ total:', q.length);
          "

      - name: Generate blog post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set +e

          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            KEYWORD_FLAG="--keyword \"${{ github.event.inputs.keyword }}\""
          else
            KEYWORD_FLAG="--from-queue"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          node scripts/generate-post.js $KEYWORD_FLAG $DRY_FLAG 2>&1 | tee /tmp/generate-output.txt
          GENERATE_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$GENERATE_EXIT_CODE" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "exit_code=$GENERATE_EXIT_CODE" >> $GITHUB_OUTPUT

          # Extract slugs and titles when available.
          ES_SLUG=$(grep "ES slug:" /tmp/generate-output.txt | awk '{print $NF}' || echo "new-post")
          echo "es_slug=$ES_SLUG" >> $GITHUB_OUTPUT

          EN_SLUG=$(grep "EN slug:" /tmp/generate-output.txt | awk '{print $NF}' || echo "new-post-en")
          echo "en_slug=$EN_SLUG" >> $GITHUB_OUTPUT

          # Extract title for PR title
          ES_TITLE=$(grep "ES title:" /tmp/generate-output.txt | sed 's/ES title:  //' || echo "New SEO post")
          echo "es_title=$ES_TITLE" >> $GITHUB_OUTPUT

          echo "es_url=${{ secrets.NEXT_PUBLIC_SITE_URL }}/es/blog/$ES_SLUG" >> $GITHUB_OUTPUT
          echo "en_url=${{ secrets.NEXT_PUBLIC_SITE_URL }}/en/blog/$EN_SLUG" >> $GITHUB_OUTPUT

          if grep -q "Generation error:" /tmp/generate-output.txt; then
            ERROR_LINE=$(grep "Generation error:" /tmp/generate-output.txt | tail -1)
            echo "error_line<<EOF" >> $GITHUB_OUTPUT
            echo "$ERROR_LINE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

          exit 0

      - name: Check for new files
        id: changes
        run: |
          if git diff --quiet && git ls-files --others --exclude-standard | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          {
            echo "changed_files<<EOF"
            git diff --name-only
            git ls-files --others --exclude-standard
            echo "EOF"
          } >> $GITHUB_OUTPUT

          ES_FILE="src/content/blog/es/${{ steps.generate.outputs.es_slug }}.md"
          EN_FILE="src/content/blog/en/${{ steps.generate.outputs.en_slug }}.md"

          if [ -f "$ES_FILE" ]; then
            echo "es_file=$ES_FILE" >> $GITHUB_OUTPUT
          fi

          if [ -f "$EN_FILE" ]; then
            echo "en_file=$EN_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Validate build before push
        id: validate
        if: steps.generate.outputs.status == 'success' && steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/build-output.txt
          BUILD_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$BUILD_EXIT_CODE" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Commit and push to main
        id: publish
        if: steps.generate.outputs.status == 'success' && steps.changes.outputs.has_changes == 'true' && steps.validate.outputs.status == 'success' && github.event.inputs.dry_run != 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog src/lib/blogSlugMap.js public/images/blog scripts/keywords-queue.json
          git commit -m "content: add SEO post \"${{ steps.generate.outputs.es_slug }}\"" 2>&1 | tee /tmp/publish-output.txt
          COMMIT_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$COMMIT_EXIT_CODE" -eq 0 ]; then
            git push origin HEAD:main 2>&1 | tee -a /tmp/publish-output.txt
            PUSH_EXIT_CODE=${PIPESTATUS[0]}
          else
            PUSH_EXIT_CODE=$COMMIT_EXIT_CODE
          fi

          if [ "$PUSH_EXIT_CODE" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "exit_code=$PUSH_EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Submit new URLs to Google Indexing API
        id: indexing
        if: steps.generate.outputs.status == 'success' && steps.changes.outputs.has_changes == 'true' && steps.validate.outputs.status == 'success' && github.event.inputs.dry_run != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INDEXING_ES_SLUG: ${{ steps.generate.outputs.es_slug }}
          INDEXING_EN_SLUG: ${{ steps.generate.outputs.en_slug }}
        run: |
          set +e
          node scripts/submit-indexing.js \
            --es-slug "$INDEXING_ES_SLUG" \
            --en-slug "$INDEXING_EN_SLUG" 2>&1 | tee /tmp/indexing-output.txt
          INDEXING_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$INDEXING_EXIT_CODE" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "exit_code=$INDEXING_EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Publish run summary
        if: always()
        env:
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed_files }}
          ES_TITLE: ${{ steps.generate.outputs.es_title }}
          ES_SLUG: ${{ steps.generate.outputs.es_slug }}
          EN_SLUG: ${{ steps.generate.outputs.en_slug }}
          ES_URL: ${{ steps.generate.outputs.es_url }}
          EN_URL: ${{ steps.generate.outputs.en_url }}
          GENERATE_STATUS: ${{ steps.generate.outputs.status }}
          GENERATE_EXIT_CODE: ${{ steps.generate.outputs.exit_code }}
          GENERATE_ERROR: ${{ steps.generate.outputs.error_line }}
          VALIDATE_STATUS: ${{ steps.validate.outputs.status }}
          VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
          PUBLISH_STATUS: ${{ steps.publish.outputs.status }}
          PUBLISH_EXIT_CODE: ${{ steps.publish.outputs.exit_code }}
          INDEXING_STATUS: ${{ steps.indexing.outputs.status }}
          INDEXING_EXIT_CODE: ${{ steps.indexing.outputs.exit_code }}
          ES_FILE: ${{ steps.changes.outputs.es_file }}
          EN_FILE: ${{ steps.changes.outputs.en_file }}
          KEYWORD: ${{ github.event.inputs.keyword || 'from queue' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          {
            echo "## SEO generation result"
            echo
            echo "- Keyword: ${KEYWORD}"
            echo "- Dry run: ${DRY_RUN:-false}"
            echo "- Generation status: ${GENERATE_STATUS:-unknown}"
            echo "- Generation exit code: ${GENERATE_EXIT_CODE:-n/a}"
            echo "- Changes written: ${HAS_CHANGES:-false}"
            echo "- ES title: ${ES_TITLE:-n/a}"
            echo "- ES slug: ${ES_SLUG:-n/a}"
            echo "- EN slug: ${EN_SLUG:-n/a}"
            echo "- ES URL: ${ES_URL:-n/a}"
            echo "- EN URL: ${EN_URL:-n/a}"
            if [ -n "${GENERATE_ERROR}" ]; then
              echo "- Failure reason: ${GENERATE_ERROR}"
            fi
            if [ "${GENERATE_STATUS}" != "success" ]; then
              echo "- Push to main: skipped because blog generation failed"
              echo "- Google Indexing API: skipped because no new blog files were created"
            elif [ "${DRY_RUN}" = "true" ]; then
              echo "- Push to main: skipped because this was a dry run"
              echo "- Google Indexing API: skipped because this was a dry run"
            elif [ "${HAS_CHANGES}" != "true" ]; then
              echo "- Push to main: skipped because no repo changes were detected"
              echo "- Google Indexing API: skipped because no repo changes were detected"
            elif [ "${VALIDATE_STATUS}" != "success" ]; then
              echo "- Build validation: ${VALIDATE_STATUS:-not-run} (exit code: ${VALIDATE_EXIT_CODE:-n/a})"
              echo "- Push to main: skipped because build validation failed"
              echo "- Google Indexing API: skipped because build validation failed"
            else
              echo "- Build validation: ${VALIDATE_STATUS:-not-run} (exit code: ${VALIDATE_EXIT_CODE:-n/a})"
              echo "- Push to main: ${PUBLISH_STATUS:-not-run} (exit code: ${PUBLISH_EXIT_CODE:-n/a})"
              echo "- Google Indexing API: ${INDEXING_STATUS:-not-run} (exit code: ${INDEXING_EXIT_CODE:-n/a})"
            fi
            echo
            echo "### Changed files"
            if [ -n "${CHANGED_FILES}" ]; then
              printf '%s\n' "${CHANGED_FILES}" | sed '/^$/d' | sed 's/^/- /'
            else
              echo "- None"
            fi
            echo
            echo "### Generator output"
            echo '```text'
            cat /tmp/generate-output.txt
            echo '```'

            echo
            echo "### Publish output"
            echo '```text'
            if [ -f /tmp/publish-output.txt ]; then
              cat /tmp/publish-output.txt
            else
              echo "Publish step did not run."
            fi
            echo '```'

            echo
            echo "### Build validation output"
            echo '```text'
            if [ -f /tmp/build-output.txt ]; then
              cat /tmp/build-output.txt
            else
              echo "Build validation step did not run."
            fi
            echo '```'

            echo
            echo "### Indexing output"
            echo '```text'
            if [ -f /tmp/indexing-output.txt ]; then
              cat /tmp/indexing-output.txt
            else
              echo "Indexing step did not run."
            fi
            echo '```'

            if [ -n "${ES_FILE}" ] && [ -f "${ES_FILE}" ]; then
              echo
              echo "### Spanish blog preview"
              echo '```markdown'
              sed -n '1,80p' "${ES_FILE}"
              echo '```'
            fi

            if [ -n "${EN_FILE}" ] && [ -f "${EN_FILE}" ]; then
              echo
              echo "### English blog preview"
              echo '```markdown'
              sed -n '1,80p' "${EN_FILE}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if generation failed
        if: steps.generate.outputs.status == 'failed'
        run: |
          echo "Blog generation failed before any files were created. See the run summary for the error and generator output."
          exit 1

      - name: Fail workflow if publish failed
        if: steps.publish.outputs.status == 'failed'
        run: |
          echo "Generated files were created, but pushing to main failed. See the run summary for the publish output."
          exit 1

      - name: Fail workflow if build validation failed
        if: steps.validate.outputs.status == 'failed'
        run: |
          echo "Generated files were created, but the site build failed. The commit was not pushed to main. See the run summary for the build validation output."
          exit 1
